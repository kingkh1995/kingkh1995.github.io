<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kaikoo的四次元口袋</title>
<link rel="preload" href="assets/ZCOOLKuaiLe.woff2" as="font" type="font/woff2" crossorigin>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js" crossorigin="anonymous"></script>
<style>
@font-face {
  font-family: 'ZCOOL KuaiLe';
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url('assets/ZCOOLKuaiLe.woff2') format('woff2');
}
:root {
  --dora-blue: #1E90FF;
  --dora-blue-dark: #1565C0;
  --dora-blue-deep: #0A3D7A;
  --dora-blue-light: #64B5F6;
  --dora-white: #FFFFFF;
  --dora-yellow: #FFC107;
  --dora-yellow-glow: #FFD54F;
  --dora-red: #FF5252;
  --dora-red-dark: #E53935;
  --dora-belly: #FFFEF9;
  --text: #2C2C2C;
  --text-light: #666;
  --shadow: 0 4px 24px rgba(0,0,0,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Helvetica Neue", sans-serif;
  background: linear-gradient(175deg, #42A5F5 0%, #1E90FF 15%, #1976D2 50%, #0D47A1 100%);
  background-attachment: fixed;
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow-x: hidden;
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

/* ====== Floating Sparkles ====== */
.sparkles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.sparkle {
  position: absolute;
  width: 6px; height: 6px;
  background: radial-gradient(circle, #FFF 0%, var(--dora-yellow-glow) 40%, var(--dora-yellow) 100%);
  border-radius: 50%;
  animation: floatUp 10s linear infinite;
  opacity: 0;
  box-shadow: 0 0 5px 1px rgba(255, 213, 79, 0.45);
  will-change: transform, opacity;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
  8% { opacity: 1; }
  25% { transform: translateY(75vh) translateX(18px) scale(1.4); }
  50% { transform: translateY(50vh) translateX(-12px) scale(1); opacity: 0.9; }
  75% { transform: translateY(25vh) translateX(10px) scale(0.7); opacity: 0.4; }
  100% { transform: translateY(-10vh) translateX(0) scale(0.2); opacity: 0; }
}

@media (prefers-reduced-motion: reduce) {
  .sparkle { animation: none; display: none; }
}
@media (max-width: 480px) {
  .sparkle {
    box-shadow: 0 0 3px 1px rgba(255, 213, 79, 0.35);
  }
}

/* ====== Header ====== */
.site-header {
  background: linear-gradient(180deg, var(--dora-blue-deep) 0%, #0D5CAD 100%);
  color: #fff;
  padding: 1.8rem 2rem 2rem;
  text-align: center;
  position: relative;
  z-index: 1;
  box-shadow: 0 4px 20px rgba(10,61,122,0.4);
}
.site-header::after {
  content: '';
  position: absolute;
  bottom: -16px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-top: 16px solid #0D5CAD;
  z-index: 1;
}

/* Red collar (full-width across header, bell hangs from it) */
.header-collar {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  margin: 0 0 0.8rem;
  width: 100%;
  height: 28px;
  padding: 0 1rem;
}
.header-collar::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, #E53935 0%, #C62828 40%, #B71C1C 60%, #E53935 100%);
  border-radius: 14px;
  box-shadow: 0 3px 10px rgba(229,57,53,0.4), inset 0 1px 2px rgba(255,255,255,0.2);
}
/* Collar stripe detail */
.header-collar::after {
  content: '';
  position: absolute;
  top: 50%; left: 10%; right: 10%;
  height: 2px;
  background: rgba(255,255,255,0.25);
  transform: translateY(-50%);
  border-radius: 1px;
}

/* Bell decoration — sits on the collar */
.header-bell {
  display: inline-block;
  width: 44px; height: 44px;
  background: radial-gradient(circle at 40% 35%, var(--dora-yellow-glow) 0%, var(--dora-yellow) 50%, #F9A825 100%);
  border-radius: 50% 50% 45% 45%;
  position: relative;
  z-index: 1;
  animation: bellSwing 4s ease-in-out infinite;
  box-shadow: 0 3px 12px rgba(255,193,7,0.5), inset 0 -3px 6px rgba(0,0,0,0.1);
  margin-top: -8px;
}
.header-bell::before {
  content: '';
  position: absolute;
  bottom: -6px; left: 50%;
  transform: translateX(-50%);
  width: 8px; height: 10px;
  background: var(--dora-red);
  border-radius: 0 0 4px 4px;
}
.header-bell::after {
  content: '';
  position: absolute;
  top: 8px; left: 50%;
  transform: translateX(-50%);
  width: 14px; height: 3px;
  background: rgba(0,0,0,0.12);
  border-radius: 2px;
}

@keyframes bellSwing {
  0%, 100% { transform: rotate(0deg); }
  15% { transform: rotate(8deg); }
  30% { transform: rotate(-6deg); }
  45% { transform: rotate(4deg); }
  60% { transform: rotate(-2deg); }
  75% { transform: rotate(0deg); }
}

.site-header a {
  display: block;
  color: #fff;
  text-decoration: none;
  font-family: "ZCOOL KuaiLe", "PingFang SC", "Microsoft YaHei", cursive;
  font-size: 2rem;
  letter-spacing: 0.06em;
  text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.header-subtitle {
  font-family: "ZCOOL KuaiLe", "PingFang SC", "Microsoft YaHei", cursive;
  font-size: 0.85rem;
  font-weight: 400;
  color: var(--dora-blue-light);
  margin-top: 0.3rem;
  letter-spacing: 0.08em;
}

/* ====== Main Content ====== */
.site-main {
  flex: 1;
  max-width: 1380px;
  width: 92%;
  margin: 2.5rem auto 2rem;
  padding: 2.5rem 2rem 2rem;
  background: var(--dora-belly);
  border-radius: 20px 20px 16px 16px;
  box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,0.1);
  position: relative;
  z-index: 1;
  animation: pocketReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Red nose dot accent */
.site-main::after {
  content: '';
  position: absolute;
  top: 28px; right: 28px;
  width: 12px; height: 12px;
  background: var(--dora-red);
  border-radius: 50%;
  opacity: 0.7;
  box-shadow: 0 0 8px rgba(255,82,82,0.3);
}

@keyframes pocketReveal {
  0% { opacity: 0; transform: translateY(16px) scaleY(0.96); }
  100% { opacity: 1; transform: translateY(0) scaleY(1); }
}

/* ====== Breadcrumb ====== */
.breadcrumb {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.9rem;
  color: var(--text-light);
  margin-bottom: 1.8rem;
  padding-bottom: 0.8rem;
  border-bottom: 2px dashed #e8e8e8;
}
.breadcrumb-date {
  font-size: 0.82rem;
  color: #bbb;
  white-space: nowrap;
  flex-shrink: 0;
}
.breadcrumb a {
  color: var(--dora-blue-dark);
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s;
}
.breadcrumb a:hover { color: var(--dora-yellow); }
.breadcrumb span { margin: 0 0.4rem; color: #bbb; }

/* ====== Category Cards ====== */
.card-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1rem;
}

.category-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #fff;
  border: 2.5px solid #e8e8e8;
  border-radius: 16px;
  padding: 1.6rem 1rem;
  text-decoration: none;
  color: var(--text);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease, border-color 0.3s ease;
  position: relative;
  overflow: hidden;
  animation: cardPopIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.category-card:nth-child(1) { animation-delay: 0.06s; }
.category-card:nth-child(2) { animation-delay: 0.12s; }
.category-card:nth-child(3) { animation-delay: 0.18s; }
.category-card:nth-child(4) { animation-delay: 0.24s; }
.category-card:nth-child(5) { animation-delay: 0.30s; }
.category-card:nth-child(6) { animation-delay: 0.36s; }
.category-card:nth-child(7) { animation-delay: 0.42s; }
.category-card:nth-child(8) { animation-delay: 0.48s; }
.category-card:nth-child(9) { animation-delay: 0.54s; }
.category-card:nth-child(10) { animation-delay: 0.60s; }
.category-card:nth-child(11) { animation-delay: 0.66s; }
.category-card:nth-child(12) { animation-delay: 0.72s; }

.category-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--dora-blue), var(--dora-blue-light), var(--dora-blue));
  transform: scaleX(0);
  transition: transform 0.35s ease;
}
.category-card:hover, .category-card:active {
  border-color: var(--dora-yellow);
  transform: translateY(-6px);
  box-shadow: 0 12px 32px rgba(30,144,255,0.18), 0 0 0 3px rgba(255,193,7,0.12);
}
.category-card:active { transform: translateY(-2px) scale(0.98); }
.category-card:focus-visible {
  outline: 3px solid var(--dora-yellow);
  outline-offset: 3px;
  border-color: var(--dora-yellow);
}
.category-card:hover::before { transform: scaleX(1); }

.category-card .cat-icon {
  font-size: 2rem;
  margin-bottom: 0.5rem;
  transition: transform 0.3s ease;
}
.category-card:hover .cat-icon { transform: scale(1.2) rotate(-5deg); }

.category-card .cat-name {
  font-family: "ZCOOL KuaiLe", "PingFang SC", "Microsoft YaHei", cursive;
  font-size: 1.1rem;
  font-weight: 400;
  color: var(--dora-blue-deep);
  margin-bottom: 0.3rem;
}
.category-card .cat-count {
  font-size: 0.8rem;
  color: #999;
  background: #f5f5f5;
  padding: 0.15rem 0.7rem;
  border-radius: 20px;
  transition: all 0.3s ease;
}
.category-card:hover .cat-count {
  background: var(--dora-yellow);
  color: #fff;
}

@keyframes cardPopIn {
  0% { opacity: 0; transform: scale(0.7) translateY(20px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

/* ====== Article List ====== */
.article-list { list-style: none; }
.article-item {
  display: block;
  padding: 1.1rem 1rem;
  border-left: 3px solid transparent;
  border-radius: 0 12px 12px 0;
  text-decoration: none;
  color: var(--text);
  margin-bottom: 0.25rem;
  transition: all 0.25s ease;
  animation: articleSlideIn 0.5s ease both;
}
.article-item:nth-child(1) { animation-delay: 0.05s; }
.article-item:nth-child(2) { animation-delay: 0.10s; }
.article-item:nth-child(3) { animation-delay: 0.15s; }
.article-item:nth-child(4) { animation-delay: 0.20s; }
.article-item:nth-child(5) { animation-delay: 0.25s; }

.article-item:hover, .article-item:active {
  background: #FFFDE7;
  border-left-color: var(--dora-yellow);
  transform: translateX(4px);
}
.article-item:active { opacity: 0.85; }
.article-item:focus-visible {
  outline: 3px solid var(--dora-yellow);
  outline-offset: 2px;
  border-left-color: var(--dora-yellow);
  background: #FFFDE7;
}
.article-item .art-title {
  font-family: "ZCOOL KuaiLe", "PingFang SC", "Microsoft YaHei", cursive;
  font-size: 1.1rem;
  font-weight: 400;
  color: var(--dora-blue-dark);
  margin-bottom: 0.2rem;
}
.article-item .art-summary {
  font-size: 0.88rem;
  color: var(--text-light);
  margin-bottom: 0.2rem;
}
.article-item .art-date {
  font-size: 0.78rem;
  color: #bbb;
}

@keyframes articleSlideIn {
  0% { opacity: 0; transform: translateX(-12px); }
  100% { opacity: 1; transform: translateX(0); }
}

/* ====== Article Content ====== */
.article-content {
  animation: fadeIn 0.5s ease;
}
@keyframes fadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

.article-content h1 {
  font-family: "ZCOOL KuaiLe", "PingFang SC", "Microsoft YaHei", cursive;
  font-size: 1.9rem;
  font-weight: 400;
  margin-bottom: 1rem;
  color: var(--dora-blue-deep);
  position: relative;
  padding-left: 1rem;
}
.article-content h1::before {
  content: '';
  position: absolute;
  left: 0; top: 0.2em; bottom: 0.2em;
  width: 4px;
  background: var(--dora-yellow);
  border-radius: 2px;
}
.article-content h2 {
  font-size: 1.4rem;
  margin: 1.8rem 0 0.8rem;
  padding-bottom: 0.4rem;
  border-bottom: 2px solid var(--dora-yellow);
  color: var(--dora-blue-dark);
}
.article-content h3 { font-size: 1.15rem; margin: 1.4rem 0 0.5rem; color: #444; }
.article-content h4 { font-size: 1rem; margin: 1.1rem 0 0.4rem; color: #555; }
.article-content p { margin-bottom: 1rem; }
.article-content ul, .article-content ol { margin: 0.5rem 0 1rem 1.5rem; }
.article-content li { margin-bottom: 0.3rem; }
.article-content blockquote {
  margin: 1.2rem 0;
  padding: 0.7rem 1.2rem;
  border-left: 4px solid var(--dora-yellow);
  background: linear-gradient(90deg, #FFFDE7 0%, #FFFEF5 100%);
  border-radius: 0 8px 8px 0;
  color: #666;
  overflow-wrap: break-word;
}
.article-content blockquote p { margin-bottom: 0.3rem; }
.article-content hr { border: none; border-top: 2px dashed #e0e0e0; margin: 2rem 0; }
.article-content strong { color: var(--dora-blue-deep); }
.article-content a { color: var(--dora-blue-dark); text-decoration: underline; text-underline-offset: 2px; }
.article-content a:hover { color: var(--dora-yellow); }

.article-content pre {
  background: #2C2C2C;
  padding: 1.2rem 1.4rem;
  border-radius: 12px;
  overflow-x: auto;
  margin: 1.2rem 0;
  font-size: 0.88rem;
  line-height: 1.6;
  border: 1px solid #e8e8e8;
}
.article-content code {
  font-family: "Fira Code", "Cascadia Code", Consolas, monospace;
  font-size: 0.88em;
}
.article-content code.inline-code, .article-content :not(pre) > code {
  background: #F0F4FF;
  padding: 0.15em 0.45em;
  border-radius: 4px;
  color: var(--dora-blue-dark);
  font-weight: 500;
  overflow-wrap: break-word;
}
.article-content pre code {
  background: transparent;
  padding: 0;
  color: #E0E0E0;
}
/* Mermaid diagrams — replace pre blocks with SVG; transparent bg for light article area */
.article-content .mermaid-rendered {
  background: transparent;
  padding: 1rem 0;
  text-align: center;
  overflow-x: auto;
  margin: 1.2rem 0;
}
.article-content .mermaid-rendered svg {
  max-width: 100%;
  height: auto;
}
.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x;
  margin: 1.2rem 0;
  border-radius: 8px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.table-scroll table {
  border-collapse: collapse;
  min-width: 100%;
  margin: 0;
}
.article-content th, .article-content td {
  border: 1px solid #eee;
  padding: 0.6rem 0.9rem;
  text-align: left;
}
.table-scroll th, .table-scroll td {
  white-space: nowrap;
}
.article-content th {
  background: linear-gradient(180deg, #E3F2FD, #BBDEFB);
  font-weight: 700;
  color: var(--dora-blue-deep);
}
.article-content tr:nth-child(even) td { background: #FAFAFA; }
.article-content img { max-width: 100%; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

/* ====== Article Header (Title) ====== */
.article-header {
  margin-bottom: 1.5rem;
}
.article-header .article-title {
  font-family: "ZCOOL KuaiLe", "PingFang SC", "Microsoft YaHei", cursive;
  font-size: 1.9rem;
  font-weight: 400;
  color: var(--dora-yellow);
}

/* ====== Footer ====== */
.site-footer {
  background: var(--dora-blue-deep);
  color: rgba(255,255,255,0.7);
  text-align: center;
  padding: 1.2rem;
  font-size: 0.82rem;
  position: relative;
  z-index: 1;
}

/* ====== Red Tail — Back to Top ====== */
.tail-scroll-top {
  position: fixed;
  bottom: -60px; right: 2rem;
  width: 50px; height: 50px;
  background: radial-gradient(circle at 45% 40%, #FF6B6B 0%, var(--dora-red) 60%, var(--dora-red-dark) 100%);
  border-radius: 50%;
  border: none;
  cursor: pointer;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease, bottom 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 4px 16px rgba(255,82,82,0.45), inset 0 -3px 6px rgba(0,0,0,0.1);
}
.tail-scroll-top.visible {
  opacity: 1;
  bottom: 2rem;
  pointer-events: auto;
}
.tail-scroll-top:hover {
  box-shadow: 0 6px 24px rgba(255,82,82,0.6), inset 0 -3px 6px rgba(0,0,0,0.1);
}

/* ====== Old Blog Link ====== */
.old-blog-link {
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  font-size: 0.78rem;
  letter-spacing: 0.04em;
  transition: color 0.25s ease, text-shadow 0.25s ease;
}
.old-blog-link:hover {
  color: var(--dora-yellow-glow);
  text-shadow: 0 0 6px rgba(255,213,79,0.4);
}
.footer-icon {
  margin-right: 0.3em;
  font-size: 0.7rem;
}
.github-icon {
  vertical-align: -1px;
  margin-right: 0.3em;
}
.footer-sep {
  color: rgba(255,255,255,0.3);
}

/* ====== Responsive ====== */
@media (max-width: 1024px) {
  .card-grid { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 768px) {
  .card-grid { grid-template-columns: repeat(3, 1fr); gap: 0.8rem; }
  .site-main { width: 94%; margin: 2rem auto 1.5rem; padding: 1.8rem 1.2rem 1.5rem; }
  .site-main::after { top: 14px; right: 14px; width: 10px; height: 10px; }
  .site-header a { font-size: 1.6rem; }
  .header-bell { width: 36px; height: 36px; }
  .header-collar { height: 24px; }
  .article-header .article-title { font-size: 1.7rem; }
}
@media (max-width: 480px) {
  .card-grid { grid-template-columns: repeat(2, 1fr); }
  .site-main { width: 96%; margin: 1.5rem auto 1rem; padding: 1.4rem 1rem 1.2rem; border-radius: 14px 14px 12px 12px; }
  .site-main::after { top: 10px; right: 10px; width: 8px; height: 8px; }
  .site-header { padding: 1.2rem 1rem 1.4rem; }
  .site-header a { font-size: 1.5rem; }
  .header-bell { width: 30px; height: 30px; }
  .header-collar { height: 20px; }
  .tail-scroll-top { bottom: 1.25rem; right: 1.25rem; width: 42px; height: 42px; }
  body { line-height: 1.6; }
  .article-content pre { font-size: 0.95rem; }
  .category-card { padding: 1.2rem 0.8rem; }
  .article-header .article-title { font-size: 1.5rem; }
}
</style>
</head>
<body>

<div class="sparkles" id="sparkles" aria-hidden="true"></div>

<header class="site-header">
  <div class="header-collar" aria-hidden="true">
    <div class="header-bell"></div>
  </div>
  <a href="#/">kaikoo的四次元口袋</a>
  <div class="header-subtitle">~ 从口袋中取出知识的道具 ~</div>
</header>

<main class="site-main" id="app"></main>

<footer class="site-footer">

<script>
(function initSparkles() {
  const container = document.getElementById('sparkles');
  if (!container) return;
  const isMobile = window.innerWidth <= 480;
  const count = isMobile ? 15 : 30;
  const minSize = isMobile ? 3 : 4;
  const maxSize = isMobile ? 6 : 12;
  const frag = document.createDocumentFragment();
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'sparkle';
    const size = minSize + Math.random() * (maxSize - minSize);
    el.style.left = (Math.random() * 100).toFixed(2) + '%';
    el.style.width = size.toFixed(2) + 'px';
    el.style.height = size.toFixed(2) + 'px';
    el.style.animationDelay = (Math.random() * 15).toFixed(2) + 's';
    el.style.animationDuration = (8 + Math.random() * 10).toFixed(2) + 's';
    frag.appendChild(el);
  }
  container.appendChild(frag);
})();

let appEl = null;

if (typeof marked === 'undefined' || typeof marked.parse !== 'function' || typeof marked.setOptions !== 'function') {
  document.getElementById('app').textContent = '页面核心组件加载失败，请刷新重试。';
  throw new Error('marked.js not loaded or API incompatible');
}
marked.setOptions({ breaks: false, gfm: true });
marked.use({
  hooks: {
    postprocess(html) {
      html = html.replace(/<a /g, '<a target="_blank" rel="noopener" ');
      html = html.replace(/<table>/g, '<div class="table-scroll"><table>');
      html = html.replace(/<\/table>/g, '</table></div>');
      html = html.replace(/<img /g, '<img loading="lazy" ');
      return html;
    }
  }
});

/* ---- Mermaid diagram support (lazy loaded) ---- */
let _mermaidPromise = null;

function loadMermaid() {
  if (_mermaidPromise) return _mermaidPromise;
  if (window.mermaid) {
    _mermaidPromise = Promise.resolve();
    return _mermaidPromise;
  }
  _mermaidPromise = new Promise(function (resolve, reject) {
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js';
    script.onload = function () {
      window.mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
      resolve();
    };
    script.onerror = function () {
      _mermaidPromise = null;
      reject(new Error('Mermaid CDN load failed'));
    };
    document.head.appendChild(script);
  });
  return _mermaidPromise;
}

async function renderMermaidBlocks(container, requestId) {
  var blocks = container.querySelectorAll('pre code.language-mermaid');
  if (blocks.length === 0) return;

  try { await loadMermaid(); }
  catch (e) { return; /* CDN failed, keep original code blocks */ }

  if (requestId !== articleRequestId) return; /* navigation occurred, abort */

  var diagrams = [];
  for (var i = 0; i < blocks.length; i++) {
    var block = blocks[i];
    var source = block.textContent.trim();
    if (!source) continue;
    var id = 'mermaid-diagram-' + i + '-' + Date.now();
    diagrams.push({ id: id, source: source, pre: block.parentElement });
  }

  var results = await Promise.allSettled(diagrams.map(function (d) {
    return window.mermaid.render(d.id, d.source).then(function (result) {
      return { element: d.pre, svg: result.svg };
    });
  }));

  results.forEach(function (r) {
    if (r.status === 'fulfilled') {
      var div = document.createElement('div');
      div.className = 'mermaid-rendered';
      div.innerHTML = r.value.svg;
      r.value.element.replaceWith(div);
    }
  });
}

const CATEGORY_NAMES = {
  'architecture': '架构模式', 'java': 'Java', 'jvm': 'JVM', 'spring': 'Spring',
  'database': '数据库', 'distributed': '分布式', 'computer-basics': '计算机基础',
  'spring-cloud-alibaba': 'Spring Cloud Alibaba', 'spring-cloud': 'Spring Cloud',
  'mq': 'MQ', 'security': '安全', 'dev-tools': '开发工具', 'container': '容器 & 云原生',
  'cicd': 'CI/CD', 'http-server': 'HTTP服务器', 'monitoring': '可观测性',
  'rpc': 'RPC框架', 'scheduling': '任务调度', 'sharding': '分库分表', 'cache': '缓存',
  'data-sync': '数据同步与集成', 'workflow': '工作流引擎', 'concurrency': '并发框架',
  'testing': '测试 & 代码质量', 'database-optimization': '数据库方案与优化', 'json': 'JSON序列化',
  'binary-serialization': '二进制序列化', 'logging': '日志框架', 'microservice': '微服务框架', 'netty': 'Netty',
  'storage': '存储', 'ai': 'AI',
  'design-patterns': '设计模式', 'search': '搜索', 'orm': 'ORM', 'api': 'API & 文档'
};

const CATEGORY_ICONS = {
  'architecture': '🏗️', 'java': '☕', 'jvm': '⚙️', 'spring': '🍃', 'database': '🗄️',
  'distributed': '🌐', 'computer-basics': '💻', 'spring-cloud-alibaba': '☁️',
  'spring-cloud': '⛅', 'mq': '📨', 'security': '🔐', 'dev-tools': '🛠️', 'container': '📦',
  'cicd': '🔄', 'http-server': '🌍', 'monitoring': '📊',   'rpc': '🔗', 'scheduling': '⏰',
  'sharding': '🧩', 'cache': '⚡', 'data-sync': '🔄', 'workflow': '📋', 'concurrency': '🏎️',
  'testing': '🧪', 'database-optimization': '🚀', 'json': '📋', 'binary-serialization': '📦',
  'logging': '📝', 'microservice': '🔧', 'storage': '💾', 'ai': '🤖', 'netty': '🔌',
  'design-patterns': '🎯', 'search': '🔍', 'orm': '🗃️', 'api': '🔌'
};

let articles = [];

function getCategoryName(key) { return CATEGORY_NAMES[key] || key; }

async function loadArticles() {
  const resp = await fetch('articles.json');
  if (!resp.ok) throw new Error('Failed to load articles.json (HTTP ' + resp.status + ')');
  articles = await resp.json();
}

function parseRoute() {
  const hash = location.hash.slice(1) || '/';
  if (hash === '/') return { page: 'home' };
  if (hash.startsWith('/article/')) {
    const parts = hash.replace('/article/', '').split('/');
    if (parts.length >= 2) return { page: 'article', category: parts[0], id: parts.slice(1).join('/') };
  }
  const cat = hash.replace('/', '');
  if (cat) return { page: 'category', category: cat };
  return { page: 'home' };
}

function buildArticleUrl(article) { return '#/article/' + article.file.replace(/\.md$/, ''); }
function buildCategoryUrl(category) { return '#/' + category; }

function renderHome() {
  const groups = {};
  articles.forEach(a => {
    if (!groups[a.category]) groups[a.category] = [];
    groups[a.category].push(a);
  });
  const cats = Object.keys(groups).sort();
  let html = '<div class="card-grid">';
  cats.forEach(cat => {
    const name = getCategoryName(cat), count = groups[cat].length, icon = CATEGORY_ICONS[cat] || '📂';
    html += '<a class="category-card" href="' + buildCategoryUrl(cat) + '">';
    html += '<span class="cat-icon">' + icon + '</span>';
    html += '<div class="cat-name">' + escapeHtml(name) + '</div>';
    html += '<div class="cat-count">' + count + ' 篇</div></a>';
  });
  html += '</div>';
  appEl.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function renderCategory(category) {
  const catName = getCategoryName(category);
  const list = articles.filter(a => a.category === category);
  list.sort((a, b) => { if (!a.date || !b.date) return 0; return b.date.localeCompare(a.date); });
  let html = '<nav aria-label="breadcrumb" class="breadcrumb"><span class="breadcrumb-left"><a href="#/">首页</a><span>&rsaquo;</span>' + escapeHtml(catName) + '</span></nav>';
  if (list.length === 0) {
    html += '<p>该分类下暂无文章。</p>';
  } else {
    html += '<div class="article-list">';
    list.forEach(a => {
      html += '<a class="article-item" href="' + buildArticleUrl(a) + '">';
      html += '<div class="art-title">' + escapeHtml(a.title) + '</div>';
      html += '<div class="art-summary">' + escapeHtml(a.summary) + '</div>';
      html += '<div class="art-date">' + escapeHtml(a.date) + '</div></a>';
    });
    html += '</div>';
  }
  appEl.innerHTML = html;
}

let articleRequestId = 0;

async function renderArticle(category, id) {
  const article = articles.find(a => a.category === category && a.id === id);
  if (!article) { appEl.innerHTML = '<p>文章未找到</p>'; return; }
  const requestId = ++articleRequestId;
  let html = '<nav aria-label="breadcrumb" class="breadcrumb"><span class="breadcrumb-left"><a href="#/">首页</a><span>&rsaquo;</span>';
  html += '<a href="' + buildCategoryUrl(category) + '">' + escapeHtml(getCategoryName(category)) + '</a>';
  html += '<span>&rsaquo;</span>' + escapeHtml(article.title) + '</span>';
  if (article.date) {
    html += '<span class="breadcrumb-date">' + escapeHtml(article.date) + '</span>';
  }
  html += '</nav>';
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 8000);
    const resp = await fetch(article.file, { signal: controller.signal });
    clearTimeout(timeoutId);
    if (!resp.ok) throw new Error('Failed to load article: ' + article.file + ' (HTTP ' + resp.status + ')');
    if (requestId !== articleRequestId) return;
    const md = await resp.text();
    html += '<div class="article-header">';
    html += '<h1 class="article-title">' + escapeHtml(article.title) + '</h1>';
    html += '</div>';
    html += '<div class="article-content">' + marked.parse(md) + '</div>';
  } catch (e) {
    if (requestId !== articleRequestId) return;
    console.error('Article render error:', e);
    html += '<p>文章加载失败，请稍后重试。</p>';
  }
  if (requestId !== articleRequestId) return;
  appEl.innerHTML = html;
  renderMermaidBlocks(appEl, requestId);
}

function route() {
  const r = parseRoute();
  switch (r.page) {
    case 'home': renderHome(); break;
    case 'category': renderCategory(r.category); break;
    case 'article': renderArticle(r.category, r.id); break;
    default: appEl.innerHTML = '<p>页面未找到</p>';
  }
}

function safeRoute() {
  try { route(); }
  catch (e) {
    console.error('Route error:', e);
    appEl.innerHTML = '<p>页面渲染失败，请刷新重试。</p>';
  }
}

window.addEventListener('hashchange', safeRoute);
window.addEventListener('unhandledrejection', function(e) {
  console.error('Unhandled promise rejection:', e.reason);
  if (appEl) appEl.innerHTML = '<p>发生未知错误，请刷新重试。</p>';
});
window.addEventListener('DOMContentLoaded', async () => {
  appEl = document.getElementById('app');
  document.getElementById('year').textContent = new Date().getFullYear();
  try { await loadArticles(); }
  catch (e) {
    console.error('loadArticles error:', e);
    if (appEl) appEl.innerHTML = '<p>数据加载失败，请刷新重试。</p>';
    return;
  }
  safeRoute();
});

/* Red Tail — Back to Top */
(function() {
  const btn = document.getElementById('tailTop');
  let ticking = false;

  function updateVisibility() {
    const visible = window.scrollY > 400;
    btn.classList.toggle('visible', visible);
  }

  window.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(function() {
        updateVisibility();
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });

  btn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>
